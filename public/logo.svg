<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="puffCenter" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F5D06A"/>
      <stop offset="100%" stop-color="#C9920A"/>
    </radialGradient>
    <radialGradient id="puffSide" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E0B535"/>
      <stop offset="100%" stop-color="#A87808"/>
    </radialGradient>
    <radialGradient id="puffBack" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C49620"/>
      <stop offset="100%" stop-color="#8A6005"/>
    </radialGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D06A"/>
      <stop offset="100%" stop-color="#C48F08"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13181F"/>
      <stop offset="100%" stop-color="#0B0E14"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- App icon rounded background -->
  <rect width="200" height="200" rx="46" fill="url(#bgGrad)"/>

  <!-- Subtle inner border glow -->
  <rect width="200" height="200" rx="46" fill="none" stroke="#E8B84B" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- Bucket body -->
  <path d="M58 110 L142 110 L129 168 L71 168 Z" fill="#151B24"/>
  <!-- Bucket body border -->
  <path d="M58 110 L142 110 L129 168 L71 168 Z" fill="none" stroke="#E8B84B" stroke-width="1" stroke-opacity="0.18"/>

  <!-- Bucket vertical stripes -->
  <path d="M98 110 L108 110 L105 168 L98 168 Z" fill="#E8B84B" opacity="0.1"/>
  <path d="M73 110 L82 110 L76 168 L71 168 Z" fill="#E8B84B" opacity="0.07"/>
  <path d="M118 110 L127 110 L129 168 L124 168 Z" fill="#E8B84B" opacity="0.07"/>

  <!-- Bucket top rim -->
  <rect x="54" y="103" width="92" height="10" rx="5" fill="url(#rimGrad)" filter="url(#softShadow)"/>
  <!-- Rim highlight -->
  <rect x="54" y="103" width="92" height="4" rx="5" fill="#F8E080" opacity="0.35"/>

  <!-- Popcorn puffs — back row (darker) -->
  <circle cx="69" cy="95" r="13" fill="url(#puffBack)" filter="url(#softShadow)"/>
  <circle cx="131" cy="95" r="13" fill="url(#puffBack)" filter="url(#softShadow)"/>

  <!-- Popcorn puffs — mid row -->
  <circle cx="83" cy="101" r="15" fill="url(#puffSide)" filter="url(#softShadow)"/>
  <circle cx="117" cy="101" r="15" fill="url(#puffSide)" filter="url(#softShadow)"/>

  <!-- Center hero puff (largest) -->
  <circle cx="100" cy="87" r="21" fill="url(#puffCenter)" filter="url(#softShadow)"/>

  <!-- Subtle specular highlight on center puff -->
  <ellipse cx="93" cy="80" rx="7" ry="5" fill="#FFF8DC" opacity="0.3"/>

  <!-- Play button integrated into center puff — clean triangle -->
  <polygon points="95,79 95,95 112,87" fill="#0B0E14" opacity="0.32"/>
  <!-- Play button inner highlight (gives depth) -->
  <polygon points="96,81 96,93 110,87" fill="#F5D06A" opacity="0.12"/>

  <!-- Small highlight dots on side puffs -->
  <circle cx="77" cy="96" r="3" fill="#F8E080" opacity="0.35"/>
  <circle cx="123" cy="96" r="3" fill="#F8E080" opacity="0.35"/>
</svg>
